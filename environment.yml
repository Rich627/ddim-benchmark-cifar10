name: ddim_env
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy<2
  - scipy
  - matplotlib
  - pyyaml
  - tqdm
  - pandas
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - torch==2.1.0+cu118
    - torchvision==0.16.0+cu118
    - pytorch-fid
    - lmdb
